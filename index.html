<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Whale v. Beluga Entertainment LLC</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }
  canvas {
    display: block;
    width: 100vw;
    height: calc(100vw * 9 / 16);
    max-height: 100vh;
    max-width: calc(100vh * 16 / 9);
    object-fit: contain;
  }
  @media (max-aspect-ratio: 16/9) {
    /* Tall screens (phones in portrait) - letterbox top/bottom */
    canvas { width: 100vw; height: calc(100vw * 9 / 16); }
  }
  @media (min-aspect-ratio: 16/9) {
    /* Wide screens - pillarbox left/right */
    canvas { height: 100vh; width: calc(100vh * 16 / 9); }
  }
  #startBtn, #replayBtn {
    position: absolute;
    padding: 14px 36px;
    font-size: clamp(14px, 3vw, 20px);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: rgba(20, 60, 80, 0.9);
    color: #c8dce8;
    border: 2px solid #5a8a9a;
    cursor: pointer;
    z-index: 10;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  #startBtn:hover, #replayBtn:hover, #startBtn:active, #replayBtn:active {
    background: rgba(40, 80, 100, 0.95);
  }
  #replayBtn { display: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="startBtn">PLAY</button>
<button id="replayBtn">REPLAY</button>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1280, H = 720;
canvas.width = W; canvas.height = H;

const C = {
  deepOcean: '#0a1628', midOcean: '#0f2a4a', lightOcean: '#163d5e',
  coral: '#6b3a2a', coralLight: '#8a5240',
  gold: '#d4a843', warmLight: '#ffeaaa', outline: '#0a0a0a',
  blueWhale: '#4a6a8a', blueWhaleBelly: '#7a9ab0',
  orca: '#1a1a2e', orcaWhite: '#e8e8e0',
  humpback: '#5a5a50', humpbackBelly: '#8a8a7a',
  beluga: '#e0dcd0',
  fish: '#7aaaca',
  suitNavy: '#1a2a3a', suitCharcoal: '#2a2a2a', suitGrey: '#3a3a3a',
  tieRed: '#8a2a2a', tieBlue: '#2a3a6a', tieGold: '#9a8a3a',
  shirtWhite: '#d8d8d0',
  bubbleBg: '#f0efe8', bubbleBorder: '#2a2a2a', bubbleText: '#1a1a1a',
};

// Bubbles & particles
let bubbles = [], particles = [];
for (let i = 0; i < 30; i++) bubbles.push({ x: Math.random()*W, y: Math.random()*H+H, r: Math.random()*4+1, speed: Math.random()*0.4+0.1, wobble: Math.random()*Math.PI*2, wobbleSpeed: Math.random()*0.02+0.005 });
for (let i = 0; i < 60; i++) particles.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*2+0.8, alpha: Math.random()*0.5+0.1, dx: (Math.random()-0.5)*0.2, dy: (Math.random()-0.5)*0.1 });

let time = 0, animFrame = null;

// Character positions tracked globally for bubble placement
let charPositions = {
  judge: { x: 0, y: 0 },
  adam: { x: 0, y: 0 },
  orca: { x: 0, y: 0 },
  beluga: { x: 0, y: 0 },
  fish: { x: 0, y: 0 },
};

// Caption timeline - speaker key used to find character position for tail
// bubbleDir: which direction bubble goes relative to character ('above-left', 'above-right', 'above')
const captions = [
  { start: 3, end: 7.5, speaker: 'judge', text: "Order. Let's get this over with.", bubbleDir: 'above' },
  { start: 9, end: 14.5, speaker: 'adam', text: "Your Honor, my client's whale song — registered under the Oceanic Copyright Act — was sampled without license, consent, or even a courtesy echo.", bubbleDir: 'above-left' },
  { start: 15.5, end: 19.5, speaker: 'adam', text: "Beluga Entertainment profited 2.3 million dollars. My client received nothing.", bubbleDir: 'above-left' },
  { start: 21, end: 24, speaker: 'orca', text: "Transformative use, Your Honor. We added reverb.", bubbleDir: 'above-right' },
  { start: 25, end: 27.5, speaker: 'judge', text: "...That's your defense?", bubbleDir: 'above' },
  { start: 28, end: 29.5, speaker: 'orca', text: "It was a lot of reverb.", bubbleDir: 'above-right' },
  { start: 31, end: 35, speaker: 'judge', text: "10,000 dollars in damages. We're done here.", bubbleDir: 'above' },
  { start: 41.5, end: 44.5, speaker: 'fish', text: "Great work today, Adam. Oh — and happy birthday.", bubbleDir: 'above' },
  { start: 45.5, end: 49, speaker: 'adam', text: "Hmm, well, I'm going home to celebrate anti-semite nite.", bubbleDir: 'above-left' },
];

// Check if a speaker is currently talking
function isSpeaking(speakerKey) {
  for (let cap of captions) {
    if (cap.speaker === speakerKey && time >= cap.start && time <= cap.end) return true;
  }
  return false;
}

// Mouth open amount (cycles when talking)
function mouthOpen(speakerKey) {
  if (!isSpeaking(speakerKey)) return 0;
  return (Math.sin(time * 12) * 0.5 + 0.5); // 0-1 cycle
}

// Expression system per character based on time
function getExpression(who) {
  // brows: 'neutral','raised','angry','worried'
  // eyes: 'normal','half','wide','squint'
  // mouthBase: 'neutral','smile','frown' (talking overrides with open/close)
  let expr = { brows: 'neutral', eyes: 'normal', mouthBase: 'neutral' };

  if (who === 'judge') {
    expr.brows = 'neutral'; expr.eyes = 'half'; expr.mouthBase = 'frown'; // perpetually tired
    if (time > 25 && time < 27.5) { expr.brows = 'raised'; expr.eyes = 'wide'; } // "that's your defense?"
    if (time > 31 && time < 35) { expr.brows = 'angry'; expr.eyes = 'normal'; } // delivering verdict
  } else if (who === 'adam') {
    expr.brows = 'neutral'; expr.eyes = 'normal'; expr.mouthBase = 'neutral';
    if (time > 9 && time < 20) { expr.brows = 'angry'; expr.eyes = 'normal'; } // arguing passionately
    if (time > 35 && time < 40) { expr.brows = 'neutral'; expr.eyes = 'normal'; expr.mouthBase = 'smile'; } // satisfied
    if (time > 45 && time < 49) { expr.brows = 'neutral'; expr.eyes = 'half'; expr.mouthBase = 'neutral'; } // deadpan response
  } else if (who === 'orca') {
    expr.brows = 'neutral'; expr.eyes = 'half'; expr.mouthBase = 'smile'; // smug
    if (time > 25 && time < 28) { expr.brows = 'neutral'; expr.eyes = 'normal'; expr.mouthBase = 'smile'; } // confident
    if (time > 31 && time < 35) { expr.brows = 'worried'; expr.eyes = 'normal'; expr.mouthBase = 'frown'; } // lost
  } else if (who === 'beluga') {
    expr.brows = 'worried'; expr.eyes = 'normal'; expr.mouthBase = 'smile'; // nervous smile
    if (time > 31) { expr.brows = 'worried'; expr.eyes = 'wide'; } // verdict
    if (time > 36) { expr.brows = 'worried'; expr.eyes = 'half'; expr.mouthBase = 'frown'; } // fainted
  }
  return expr;
}

function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
function easeOut(t) { return 1-(1-t)*(1-t); }
function lerp(a, b, t) { return a+(b-a)*Math.max(0,Math.min(1,t)); }

// ===== DRAWING FUNCTIONS =====

function drawOcean(panY) {
  let grd = ctx.createLinearGradient(0, panY, 0, panY+H*2);
  grd.addColorStop(0, '#1a5a7a'); grd.addColorStop(0.2, '#0f3a5a');
  grd.addColorStop(0.5, C.midOcean); grd.addColorStop(1, C.deepOcean);
  ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);


  // Distant fish silhouettes in background
  ctx.save(); ctx.globalAlpha = 0.15;
  let bgFish = [
    {x: 180, y: 120, s: 0.8, sp: 0.3, off: 0},
    {x: 900, y: 80, s: 0.6, sp: 0.2, off: 2},
    {x: 600, y: 160, s: 1.0, sp: 0.25, off: 4},
    {x: 1100, y: 200, s: 0.7, sp: 0.35, off: 1},
    {x: 350, y: 250, s: 0.5, sp: 0.15, off: 3},
  ];
  bgFish.forEach(f => {
    let fx = (f.x + time * f.sp * 40 + f.off * 100) % (W + 100) - 50;
    let fy = f.y + Math.sin(time * 0.8 + f.off) * 15;
    ctx.save(); ctx.translate(fx, fy); ctx.scale(f.s, f.s);
    ctx.fillStyle = '#1a3a5a';
    ctx.beginPath(); ctx.ellipse(0, 0, 20, 10, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-18, 0); ctx.lineTo(-28, -8); ctx.lineTo(-28, 8); ctx.closePath(); ctx.fill();
    ctx.restore();
  });
  ctx.restore();

  // Coral formations on sides
  drawCoral();

  // Seaweed/kelp on the ocean floor
  drawSeaweed();
}

function drawSeaweed() {
  let seaweedPositions = [
    {x: 30, h: 90}, {x: 70, h: 110}, {x: 110, h: 80},
    {x: 1120, h: 100}, {x: 1170, h: 120}, {x: 1220, h: 85},
    {x: 200, h: 60}, {x: 1050, h: 70},
  ];
  seaweedPositions.forEach((sw, idx) => {
    ctx.save();
    ctx.globalAlpha = 0.6;
    let baseX = sw.x;
    let baseY = H;
    let segments = 8;
    let segH = sw.h / segments;
    // Draw multiple strands per position
    for (let strand = -1; strand <= 1; strand++) {
      let sx = baseX + strand * 12;
      ctx.beginPath();
      ctx.moveTo(sx, baseY);
      for (let i = 1; i <= segments; i++) {
        let sway = Math.sin(time * 1.2 + idx * 1.5 + i * 0.4 + strand) * (6 + i * 1.5);
        let py = baseY - i * segH;
        let px = sx + sway;
        ctx.lineTo(px, py);
      }
      // Draw the strand as a thick line
      ctx.strokeStyle = '#1a5a2a';
      ctx.lineWidth = 5;
      ctx.lineCap = 'round';
      ctx.stroke();
      // Draw leaf blobs along the strand
      ctx.fillStyle = '#2a7a3a';
      for (let i = 2; i <= segments; i += 2) {
        let sway = Math.sin(time * 1.2 + idx * 1.5 + i * 0.4 + strand) * (6 + i * 1.5);
        let py = baseY - i * segH;
        let px = sx + sway;
        ctx.beginPath();
        ctx.ellipse(px + 4, py, 6, 3, 0.3, 0, Math.PI*2);
        ctx.fill();
      }
    }
    ctx.restore();
  });
}

function drawCoral() {
  ctx.save();
  ctx.globalAlpha = 0.5;

  // Left coral cluster
  drawCoralFormation(60, H - 30, 0.8);
  drawCoralFormation(140, H - 20, 0.6);

  // Right coral cluster
  drawCoralFormation(W - 80, H - 25, 0.7);
  drawCoralFormation(W - 160, H - 30, 0.9);

  ctx.restore();
}

function drawCoralFormation(x, y, scale) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  // Brain coral (round bumpy shape)
  let coralColors = ['#8a3a3a', '#a85a3a', '#7a4a5a', '#9a6a4a'];
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = coralColors[i % coralColors.length];
    ctx.beginPath();
    ctx.ellipse(i * 20 - 20, -10 - i * 8, 18, 14, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#5a2a2a';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Fan coral (branching)
  ctx.strokeStyle = '#c85a5a';
  ctx.lineWidth = 3;
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(i * 15, -40, i * 22, -55);
    ctx.stroke();
    // Small branches
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(i * 10, -25);
    ctx.lineTo(i * 18, -35);
    ctx.stroke();
    ctx.lineWidth = 3;
  }

  ctx.restore();
}

function drawCourtroomBack() {
  // Floor
  ctx.fillStyle = '#1a3048'; ctx.fillRect(0,H*0.75,W,H*0.25);
  ctx.strokeStyle = '#2a4058'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0,H*0.75); ctx.lineTo(W,H*0.75); ctx.stroke();
  // Gallery railing
  ctx.fillStyle = C.coral; ctx.strokeStyle = C.outline; ctx.lineWidth = 2.5;
  ctx.fillRect(80,H*0.62,W-160,12); ctx.strokeRect(80,H*0.62,W-160,12);
  for (let i = 0; i < 8; i++) {
    let x = 120+i*(W-240)/7;
    ctx.fillStyle = C.coral; ctx.fillRect(x-4,H*0.58,8,H*0.04+12); ctx.strokeRect(x-4,H*0.58,8,H*0.04+12);
  }
  // Tables
  drawTable(W*0.28, H*0.58, 200, 50);
  drawTable(W*0.72, H*0.58, 200, 50);
}

function drawBenchFront(cx, cy, w, h) {
  // This draws the bench OVER the judge to occlude the lower body
  drawBench(cx, cy, w, h);
}

function drawCourtroom() {
  drawCourtroomBack();
  drawBench(W*0.5, H*0.38, 320, 120);
}

function drawBench(cx,cy,w,h) {
  let bx = cx - w/2;
  let topY = cy - h/2;
  let floorY = H * 0.75;

  // Elevated platform/base extending to floor
  let platformW = w + 40;
  let platformX = cx - platformW/2;
  ctx.fillStyle = '#5a3a28';
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 2;
  ctx.fillRect(platformX, topY + h, platformW, floorY - (topY + h));
  ctx.strokeRect(platformX, topY + h, platformW, floorY - (topY + h));

  // Platform side trim
  ctx.fillStyle = '#4a2a1a';
  ctx.fillRect(platformX, topY + h, 8, floorY - (topY + h));
  ctx.fillRect(platformX + platformW - 8, topY + h, 8, floorY - (topY + h));

  // Main bench front panel
  ctx.fillStyle = C.coralLight;
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  ctx.fillRect(bx, topY, w, h);
  ctx.strokeRect(bx, topY, w, h);

  // Top trim / ledge
  ctx.fillStyle = C.gold;
  ctx.fillRect(bx - 10, topY - 8, w + 20, 12);
  ctx.strokeRect(bx - 10, topY - 8, w + 20, 12);

  // Decorative panels on bench front
  ctx.strokeStyle = '#5a3a2a';
  ctx.lineWidth = 1.5;
  let panelW = (w - 60) / 3;
  for (let i = 0; i < 3; i++) {
    let px = bx + 20 + i * (w - 40) / 3;
    ctx.strokeRect(px, topY + 15, panelW, h - 30);
  }

  // Middle trim line between bench and platform
  ctx.fillStyle = '#6a4a32';
  ctx.fillRect(bx - 5, topY + h - 2, w + 10, 6);
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(bx - 5, topY + h - 2, w + 10, 6);
}

function drawTable(cx,cy,w,h) {
  let tx = cx - w/2, ty = cy - h/2;
  let floorY = H * 0.75;

  // Table legs extending to floor
  ctx.fillStyle = '#5a3220';
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 1.5;
  // Left leg
  ctx.fillRect(tx + 10, ty + h, 12, floorY - (ty + h));
  ctx.strokeRect(tx + 10, ty + h, 12, floorY - (ty + h));
  // Right leg
  ctx.fillRect(tx + w - 22, ty + h, 12, floorY - (ty + h));
  ctx.strokeRect(tx + w - 22, ty + h, 12, floorY - (ty + h));

  // Table top
  ctx.fillStyle = C.coral;
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 2.5;
  ctx.fillRect(tx, ty, w, h);
  ctx.strokeRect(tx, ty, w, h);

  // Surface edge
  ctx.fillStyle = C.coralLight;
  ctx.fillRect(tx - 5, ty - 4, w + 10, 8);
  ctx.strokeRect(tx - 5, ty - 4, w + 10, 8);
}

// Face features drawn in local whale head space
// headX, headY = center of head ellipse in whale-local coords (already flipped)
function drawFace(headX, headY, w, h, bodyColor, expr, speakerKey) {
  let mo = mouthOpen(speakerKey);

  // Eye white
  let eyeX = headX + w*0.03, eyeY = headY - h*0.07;
  let eyeW = 6, eyeH = 7;

  // Eyelid adjustment
  if (expr.eyes === 'half') eyeH = 4;
  else if (expr.eyes === 'wide') { eyeW = 7; eyeH = 9; }
  else if (expr.eyes === 'squint') eyeH = 3;

  ctx.beginPath(); ctx.ellipse(eyeX, eyeY, eyeW, eyeH, 0, 0, Math.PI*2);
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.strokeStyle = C.outline; ctx.lineWidth = 1.5; ctx.stroke();

  // Pupil
  let pupilW = 3, pupilH = 3.5;
  if (expr.eyes === 'wide') { pupilW = 3.5; pupilH = 4; }
  ctx.beginPath(); ctx.ellipse(eyeX+1, eyeY, pupilW, pupilH, 0, 0, Math.PI*2);
  ctx.fillStyle = '#111'; ctx.fill();

  // Eyebrows
  let browY = eyeY - eyeH - 3;
  ctx.strokeStyle = C.outline; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  ctx.beginPath();
  if (expr.brows === 'angry') {
    ctx.moveTo(eyeX - 8, browY - 2); ctx.lineTo(eyeX + 8, browY + 3);
  } else if (expr.brows === 'raised') {
    ctx.moveTo(eyeX - 8, browY - 4);
    ctx.quadraticCurveTo(eyeX, browY - 8, eyeX + 8, browY - 4);
  } else if (expr.brows === 'worried') {
    ctx.moveTo(eyeX - 8, browY + 2); ctx.lineTo(eyeX + 8, browY - 3);
  } else {
    ctx.moveTo(eyeX - 8, browY); ctx.lineTo(eyeX + 8, browY);
  }
  ctx.stroke();
  ctx.lineCap = 'butt';

  // Mouth
  let mouthX = headX - w*0.02, mouthY = headY + h*0.08;
  ctx.strokeStyle = C.outline; ctx.lineWidth = 2;

  if (mo > 0.3) {
    // Talking - open mouth
    let openH = 4 + mo * 6;
    ctx.beginPath();
    ctx.ellipse(mouthX, mouthY, 8, openH, 0, 0, Math.PI*2);
    ctx.fillStyle = '#2a1a1a'; ctx.fill();
    ctx.strokeStyle = C.outline; ctx.lineWidth = 2; ctx.stroke();
  } else {
    // Closed mouth based on expression
    ctx.beginPath();
    if (expr.mouthBase === 'smile') {
      ctx.moveTo(mouthX + 10, mouthY - 2);
      ctx.quadraticCurveTo(mouthX, mouthY + 6, mouthX - 8, mouthY);
    } else if (expr.mouthBase === 'frown') {
      ctx.moveTo(mouthX + 10, mouthY + 3);
      ctx.quadraticCurveTo(mouthX, mouthY - 4, mouthX - 8, mouthY + 2);
    } else {
      ctx.moveTo(mouthX + 10, mouthY);
      ctx.quadraticCurveTo(mouthX, mouthY + 2, mouthX - 8, mouthY);
    }
    ctx.stroke();
  }
}

// Generic whale body - proper whale silhouette with bezier curves
function drawWhaleBodyNoFace(cx, cy, w, h, bodyColor, bellyColor, facing) {
  let dir = facing==='left'?-1:1;
  ctx.save(); ctx.translate(cx,cy); ctx.scale(dir,1);

  // Tail flukes (horizontal, whale-style - not vertical like fish)
  ctx.beginPath();
  // Upper fluke
  ctx.moveTo(-w*0.42, 0);
  ctx.quadraticCurveTo(-w*0.52, -h*0.05, -w*0.55, -h*0.02);
  ctx.bezierCurveTo(-w*0.62, -h*0.15, -w*0.72, -h*0.32, -w*0.78, -h*0.28);
  ctx.quadraticCurveTo(-w*0.7, -h*0.15, -w*0.58, -h*0.02);
  // Lower fluke
  ctx.quadraticCurveTo(-w*0.58, h*0.02, -w*0.7, h*0.15);
  ctx.bezierCurveTo(-w*0.72, h*0.32, -w*0.62, h*0.15, -w*0.55, h*0.02);
  ctx.quadraticCurveTo(-w*0.52, h*0.05, -w*0.42, 0);
  ctx.fillStyle = bodyColor; ctx.fill();
  ctx.strokeStyle = C.outline; ctx.lineWidth = 2.5; ctx.stroke();

  // Main body - one continuous whale shape (head+body merged)
  ctx.beginPath();
  // Start at the snout (front-bottom)
  ctx.moveTo(w*0.48, h*0.08);
  // Underjaw going back
  ctx.bezierCurveTo(w*0.35, h*0.22, w*0.15, h*0.38, -w*0.05, h*0.35);
  // Belly curving to tail stock
  ctx.bezierCurveTo(-w*0.2, h*0.3, -w*0.35, h*0.18, -w*0.45, h*0.05);
  // Tail stock (narrow part)
  ctx.bezierCurveTo(-w*0.48, 0, -w*0.48, 0, -w*0.45, -h*0.05);
  // Back (dorsal) going forward
  ctx.bezierCurveTo(-w*0.35, -h*0.22, -w*0.15, -h*0.38, w*0.0, -h*0.4);
  // Top of head - big rounded forehead
  ctx.bezierCurveTo(w*0.15, -h*0.42, w*0.35, -h*0.38, w*0.45, -h*0.2);
  // Front of face down to snout
  ctx.bezierCurveTo(w*0.5, -h*0.1, w*0.5, h*0.0, w*0.48, h*0.08);
  ctx.closePath();
  ctx.fillStyle = bodyColor; ctx.fill();
  ctx.strokeStyle = C.outline; ctx.lineWidth = 3; ctx.stroke();

  // Belly (lighter underside)
  ctx.beginPath();
  ctx.moveTo(w*0.46, h*0.08);
  ctx.bezierCurveTo(w*0.33, h*0.2, w*0.12, h*0.32, -w*0.05, h*0.3);
  ctx.bezierCurveTo(-w*0.18, h*0.25, -w*0.3, h*0.15, -w*0.38, h*0.05);
  ctx.bezierCurveTo(-w*0.25, h*0.05, w*0.1, h*0.08, w*0.46, h*0.08);
  ctx.closePath();
  ctx.fillStyle = bellyColor; ctx.fill();

  // Pectoral fin (larger, more whale-like)
  ctx.beginPath();
  ctx.moveTo(w*0.12, h*0.15);
  ctx.bezierCurveTo(w*0.08, h*0.3, -w*0.05, h*0.48, -w*0.15, h*0.45);
  ctx.bezierCurveTo(-w*0.08, h*0.35, w*0.02, h*0.22, w*0.12, h*0.15);
  ctx.fillStyle = bodyColor; ctx.fill();
  ctx.strokeStyle = C.outline; ctx.lineWidth = 2.5; ctx.stroke();

  ctx.restore();
}

function drawSuit(cx,cy,w,h,suitColor,tieColor,facing) {
  let dir = facing==='left'?-1:1;
  ctx.save(); ctx.translate(cx,cy); ctx.scale(dir,1);
  // Suit jacket - larger, more visible coverage
  ctx.beginPath();
  ctx.moveTo(w*0.35, -h*0.18);
  ctx.bezierCurveTo(w*0.30, h*0.02, w*0.20, h*0.25, -w*0.05, h*0.28);
  ctx.bezierCurveTo(-w*0.18, h*0.24, -w*0.30, h*0.14, -w*0.38, h*0.02);
  ctx.bezierCurveTo(-w*0.30, -h*0.10, -w*0.12, -h*0.20, w*0.35, -h*0.18);
  ctx.closePath();
  // Slightly lighter suit fill for visibility
  let lighterSuit = suitColor === C.suitNavy ? '#243a52' : suitColor === C.suitGrey ? '#4a4a4a' : suitColor;
  ctx.fillStyle = lighterSuit; ctx.fill(); ctx.strokeStyle = C.outline; ctx.lineWidth = 2; ctx.stroke();

  // Pocket detail (left breast)
  ctx.strokeStyle = '#666'; ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(w*0.05, h*0.02);
  ctx.lineTo(w*0.14, h*0.0);
  ctx.stroke();
  // Pocket square
  ctx.fillStyle = C.shirtWhite;
  ctx.beginPath();
  ctx.moveTo(w*0.07, h*0.0);
  ctx.lineTo(w*0.09, -h*0.04);
  ctx.lineTo(w*0.11, h*0.0);
  ctx.closePath();
  ctx.fill();

  // Shirt collar V - more prominent
  ctx.beginPath();
  ctx.moveTo(w*0.34, -h*0.16);
  ctx.lineTo(w*0.26, h*0.10);
  ctx.lineTo(w*0.14, h*0.10);
  ctx.lineTo(w*0.20, -h*0.16);
  ctx.fillStyle = C.shirtWhite; ctx.fill(); ctx.strokeStyle = C.outline; ctx.lineWidth = 1.5; ctx.stroke();

  // Collar points (lapel flaps)
  ctx.fillStyle = C.shirtWhite;
  ctx.beginPath();
  ctx.moveTo(w*0.34, -h*0.16);
  ctx.lineTo(w*0.36, -h*0.10);
  ctx.lineTo(w*0.30, -h*0.08);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(w*0.20, -h*0.16);
  ctx.lineTo(w*0.18, -h*0.10);
  ctx.lineTo(w*0.24, -h*0.08);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Tie - larger, more visible triangular shape
  ctx.beginPath();
  ctx.moveTo(w*0.29, -h*0.14);  // top-right of knot
  ctx.lineTo(w*0.27, -h*0.08);  // right side below knot
  ctx.lineTo(w*0.30, h*0.10);   // wide right at bottom
  ctx.lineTo(w*0.24, h*0.14);   // bottom point
  ctx.lineTo(w*0.18, h*0.10);   // wide left at bottom
  ctx.lineTo(w*0.21, -h*0.08);  // left side below knot
  ctx.lineTo(w*0.25, -h*0.14);  // top-left of knot
  ctx.closePath();
  ctx.fillStyle = tieColor; ctx.fill(); ctx.strokeStyle = C.outline; ctx.lineWidth = 1.5; ctx.stroke();

  // Tie knot
  ctx.beginPath();
  ctx.moveTo(w*0.25, -h*0.15);
  ctx.lineTo(w*0.29, -h*0.13);
  ctx.lineTo(w*0.27, -h*0.08);
  ctx.lineTo(w*0.21, -h*0.08);
  ctx.lineTo(w*0.25, -h*0.15);
  ctx.closePath();
  ctx.fillStyle = tieColor; ctx.fill(); ctx.strokeStyle = C.outline; ctx.lineWidth = 1; ctx.stroke();

  // Lapel lines
  ctx.beginPath(); ctx.moveTo(w*0.35,-h*0.18); ctx.quadraticCurveTo(w*0.32,h*0.05,w*0.28,h*0.20);
  ctx.strokeStyle = C.outline; ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(w*0.20,-h*0.18); ctx.quadraticCurveTo(w*0.16,h*0.05,w*0.14,h*0.20);
  ctx.strokeStyle = C.outline; ctx.lineWidth = 2; ctx.stroke();
  ctx.restore();
}

// ===== CHARACTER DRAWS =====

function drawJudgeRobe(cx, cy, w, h, facing) {
  let dir = facing==='left'?-1:1;
  ctx.save(); ctx.translate(cx,cy); ctx.scale(dir,1);
  // Black judicial robe - follows whale body, covers more than suit
  ctx.beginPath();
  ctx.moveTo(w*0.32, -h*0.08);
  ctx.bezierCurveTo(w*0.28, h*0.1, w*0.18, h*0.28, -w*0.05, h*0.3);
  ctx.bezierCurveTo(-w*0.18, h*0.26, -w*0.3, h*0.15, -w*0.38, h*0.02);
  ctx.bezierCurveTo(-w*0.3, -h*0.08, -w*0.12, -h*0.15, w*0.32, -h*0.08);
  ctx.closePath();
  ctx.fillStyle = '#1a1a1a'; ctx.fill();
  ctx.strokeStyle = C.outline; ctx.lineWidth = 2; ctx.stroke();
  // White judicial collar band
  ctx.beginPath();
  ctx.moveTo(w*0.3, -h*0.06);
  ctx.lineTo(w*0.25, h*0.02);
  ctx.lineTo(w*0.15, h*0.02);
  ctx.lineTo(w*0.2, -h*0.06);
  ctx.fillStyle = '#e8e8e0'; ctx.fill();
  ctx.strokeStyle = C.outline; ctx.lineWidth = 1.5; ctx.stroke();
  // Two white tabs
  ctx.fillStyle = '#e8e8e0';
  ctx.fillRect(w*0.19, h*0.02, 5, 14);
  ctx.fillRect(w*0.25, h*0.02, 5, 14);
  ctx.strokeStyle = C.outline; ctx.lineWidth = 1;
  ctx.strokeRect(w*0.19, h*0.02, 5, 14);
  ctx.strokeRect(w*0.25, h*0.02, 5, 14);
  ctx.restore();
}

function drawPowderedWig(headCenterX, headTopY) {
  // Proper British barrister powdered wig - flat top, curls on sides
  let wigX = headCenterX, wigY = headTopY;

  // Main wig body - flatter on top
  ctx.beginPath();
  ctx.moveTo(wigX - 22, wigY + 5);
  ctx.quadraticCurveTo(wigX - 24, wigY - 8, wigX - 15, wigY - 14);
  ctx.lineTo(wigX + 15, wigY - 14); // flat top
  ctx.quadraticCurveTo(wigX + 24, wigY - 8, wigX + 22, wigY + 5);
  ctx.quadraticCurveTo(wigX + 18, wigY + 12, wigX, wigY + 8);
  ctx.quadraticCurveTo(wigX - 18, wigY + 12, wigX - 22, wigY + 5);
  ctx.closePath();
  ctx.fillStyle = '#d8d8d0'; ctx.fill();
  ctx.strokeStyle = C.outline; ctx.lineWidth = 2; ctx.stroke();

  // Horizontal roll lines (wig texture)
  ctx.strokeStyle = '#bbb'; ctx.lineWidth = 1;
  for (let i = 0; i < 3; i++) {
    let ry = wigY - 8 + i * 6;
    ctx.beginPath();
    ctx.moveTo(wigX - 16 + i*2, ry);
    ctx.quadraticCurveTo(wigX, ry + 2, wigX + 16 - i*2, ry);
    ctx.stroke();
  }

  // Side curls (left)
  for (let i = 0; i < 2; i++) {
    ctx.beginPath();
    ctx.arc(wigX - 20, wigY + 2 + i*8, 5, 0, Math.PI*2);
    ctx.fillStyle = '#ccc'; ctx.fill();
    ctx.strokeStyle = C.outline; ctx.lineWidth = 1.2; ctx.stroke();
  }
  // Side curls (right)
  for (let i = 0; i < 2; i++) {
    ctx.beginPath();
    ctx.arc(wigX + 20, wigY + 2 + i*8, 5, 0, Math.PI*2);
    ctx.fillStyle = '#ccc'; ctx.fill();
    ctx.strokeStyle = C.outline; ctx.lineWidth = 1.2; ctx.stroke();
  }
}

function drawJudge(cx, cy, scale) {
  let s = scale||1;
  let bob = Math.sin(time*0.8+1)*3;
  cy += bob;
  let expr = getExpression('judge');

  ctx.save(); ctx.translate(cx,cy); ctx.scale(s,s);

  drawWhaleBodyNoFace(0,0,160,90,C.humpback,C.humpbackBelly,'right');
  drawJudgeRobe(0,0,160,90,'right');

  // Face - positioned on the whale's head area
  let headX = 160*0.38, headY = -90*0.18;
  drawFace(headX, headY, 160, 90, C.humpback, expr, 'judge');

  // Powdered wig (positioned on top of head)
  drawPowderedWig(headX, headY - 22);

  ctx.restore();

  charPositions.judge = { x: cx + 160*0.35*s, y: cy - 90*0.5*s };
}

function drawAdam(cx, cy, scale, bobOffset, flipperUp, facingLeft) {
  let s = scale||1;
  let bob = (bobOffset||0) + Math.sin(time*0.9)*3;
  cy += bob;
  let expr = getExpression('adam');

  ctx.save(); ctx.translate(cx,cy); ctx.scale(s,s);

  // If facing left, flip the entire whale horizontally
  if (facingLeft) {
    ctx.scale(-1, 1);
  }

  drawWhaleBodyNoFace(0,0,180,100,C.blueWhale,C.blueWhaleBelly,'right');
  drawSuit(0,0,180,100,C.suitNavy,C.tieRed,'right');

  // Briefcase
  ctx.fillStyle = '#4a3a2a'; ctx.strokeStyle = C.outline; ctx.lineWidth = 2;
  ctx.fillRect(-30,42,30,22); ctx.strokeRect(-30,42,30,22);
  ctx.fillStyle = C.gold; ctx.fillRect(-18,48,6,4);

  // Face
  let headX = 180*0.38, headY = -100*0.18;
  drawFace(headX, headY, 180, 100, C.blueWhale, expr, 'adam');

  // Raised flipper
  if (flipperUp) {
    ctx.save(); ctx.translate(20,-20);
    ctx.rotate(-0.8+Math.sin(time*2)*0.15);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(15,-30,5,-40);
    ctx.quadraticCurveTo(-5,-25,0,0);
    ctx.fillStyle = C.blueWhale; ctx.fill();
    ctx.strokeStyle = C.outline; ctx.lineWidth = 2.5; ctx.stroke();
    ctx.restore();
  }
  ctx.restore();

  charPositions.adam = { x: cx + (facingLeft ? -180*0.35*s : 180*0.35*s), y: cy - 100*0.4*s };
}

function drawOrca(cx, cy, scale) {
  let s = scale||1;
  let bob = Math.sin(time*0.7+2)*3;
  cy += bob;
  let expr = getExpression('orca');
  let w=150, h=80;

  ctx.save(); ctx.translate(cx,cy); ctx.scale(s,s);
  ctx.save(); ctx.scale(-1,1); // face left

  // Tail flukes
  ctx.beginPath();
  ctx.moveTo(-w*0.42, 0);
  ctx.quadraticCurveTo(-w*0.52, -h*0.05, -w*0.55, -h*0.02);
  ctx.bezierCurveTo(-w*0.62, -h*0.15, -w*0.72, -h*0.32, -w*0.78, -h*0.28);
  ctx.quadraticCurveTo(-w*0.7, -h*0.15, -w*0.58, -h*0.02);
  ctx.quadraticCurveTo(-w*0.58, h*0.02, -w*0.7, h*0.15);
  ctx.bezierCurveTo(-w*0.72, h*0.32, -w*0.62, h*0.15, -w*0.55, h*0.02);
  ctx.quadraticCurveTo(-w*0.52, h*0.05, -w*0.42, 0);
  ctx.fillStyle = C.orca; ctx.fill();
  ctx.strokeStyle = C.outline; ctx.lineWidth = 2.5; ctx.stroke();

  // Main body - orca whale shape
  ctx.beginPath();
  ctx.moveTo(w*0.48, h*0.05);
  ctx.bezierCurveTo(w*0.35, h*0.2, w*0.15, h*0.35, -w*0.05, h*0.32);
  ctx.bezierCurveTo(-w*0.2, h*0.28, -w*0.35, h*0.15, -w*0.45, h*0.05);
  ctx.bezierCurveTo(-w*0.48, 0, -w*0.48, 0, -w*0.45, -h*0.05);
  ctx.bezierCurveTo(-w*0.35, -h*0.2, -w*0.15, -h*0.35, w*0.0, -h*0.38);
  ctx.bezierCurveTo(w*0.15, -h*0.4, w*0.35, -h*0.35, w*0.45, -h*0.15);
  ctx.bezierCurveTo(w*0.5, -h*0.05, w*0.5, h*0.0, w*0.48, h*0.05);
  ctx.closePath();
  ctx.fillStyle = C.orca; ctx.fill();
  ctx.strokeStyle = C.outline; ctx.lineWidth = 3; ctx.stroke();

  // White belly patch
  ctx.beginPath();
  ctx.moveTo(w*0.44, h*0.05);
  ctx.bezierCurveTo(w*0.3, h*0.18, w*0.1, h*0.28, -w*0.05, h*0.26);
  ctx.bezierCurveTo(-w*0.15, h*0.22, -w*0.28, h*0.12, -w*0.35, h*0.02);
  ctx.bezierCurveTo(-w*0.2, h*0.02, w*0.1, h*0.05, w*0.44, h*0.05);
  ctx.closePath();
  ctx.fillStyle = C.orcaWhite; ctx.fill();

  // White eye patch
  ctx.beginPath(); ctx.ellipse(w*0.35,-h*0.18,10,7,0.3,0,Math.PI*2);
  ctx.fillStyle = C.orcaWhite; ctx.fill();

  // Tall dorsal fin (orca signature)
  ctx.beginPath();
  ctx.moveTo(-w*0.05, -h*0.35);
  ctx.bezierCurveTo(-w*0.02, -h*0.75, w*0.08, -h*0.8, w*0.12, -h*0.7);
  ctx.quadraticCurveTo(w*0.1, -h*0.45, w*0.05, -h*0.35);
  ctx.fillStyle = C.orca; ctx.fill();
  ctx.strokeStyle = C.outline; ctx.lineWidth = 2.5; ctx.stroke();

  // Pectoral fin
  ctx.beginPath();
  ctx.moveTo(w*0.12, h*0.12);
  ctx.bezierCurveTo(w*0.08, h*0.28, -w*0.05, h*0.42, -w*0.12, h*0.38);
  ctx.bezierCurveTo(-w*0.05, h*0.28, w*0.02, h*0.18, w*0.12, h*0.12);
  ctx.fillStyle = C.orca; ctx.fill();
  ctx.strokeStyle = C.outline; ctx.lineWidth = 2; ctx.stroke();

  // Face
  let headX = w*0.38, headY = -h*0.15;
  let mo = mouthOpen('orca');
  let eyeX = headX+w*0.02, eyeY = headY-h*0.04;
  let eyeH = expr.eyes==='half'?3:expr.eyes==='wide'?7:5;
  ctx.beginPath(); ctx.ellipse(eyeX,eyeY,5,eyeH,0,0,Math.PI*2);
  ctx.fillStyle = '#fff'; ctx.fill(); ctx.strokeStyle = C.outline; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(eyeX+1,eyeY,2.5,3,0,0,Math.PI*2);
  ctx.fillStyle = '#111'; ctx.fill();

  let browY = eyeY-eyeH-3;
  ctx.strokeStyle = '#ddd'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  ctx.beginPath();
  if (expr.brows==='angry') { ctx.moveTo(eyeX-7,browY-2); ctx.lineTo(eyeX+7,browY+3); }
  else if (expr.brows==='raised') { ctx.moveTo(eyeX-7,browY-4); ctx.quadraticCurveTo(eyeX,browY-8,eyeX+7,browY-4); }
  else if (expr.brows==='worried') { ctx.moveTo(eyeX-7,browY+2); ctx.lineTo(eyeX+7,browY-3); }
  else { ctx.moveTo(eyeX-7,browY); ctx.lineTo(eyeX+7,browY); }
  ctx.stroke(); ctx.lineCap = 'butt';

  let mouthX = headX, mouthY = headY+h*0.12;
  if (mo > 0.3) {
    let openH = 3+mo*5;
    ctx.beginPath(); ctx.ellipse(mouthX,mouthY,6,openH,0,0,Math.PI*2);
    ctx.fillStyle = '#1a0a0a'; ctx.fill(); ctx.strokeStyle = C.outline; ctx.lineWidth = 2; ctx.stroke();
  } else {
    ctx.beginPath();
    if (expr.mouthBase==='smile') { ctx.moveTo(mouthX+8,mouthY-1); ctx.quadraticCurveTo(mouthX,mouthY+5,mouthX-6,mouthY); }
    else if (expr.mouthBase==='frown') { ctx.moveTo(mouthX+8,mouthY+2); ctx.quadraticCurveTo(mouthX,mouthY-3,mouthX-6,mouthY+1); }
    else { ctx.moveTo(mouthX+8,mouthY); ctx.quadraticCurveTo(mouthX,mouthY+1,mouthX-6,mouthY); }
    ctx.strokeStyle = C.outline; ctx.lineWidth = 2; ctx.stroke();
  }

  ctx.restore(); // undo flip
  drawSuit(0,0,150,80,C.suitGrey,C.tieBlue,'left');
  ctx.restore();

  charPositions.orca = { x: cx - w*0.38*s, y: cy - h*0.5*s };
}

function drawBeluga(cx, cy, scale, bobOffset, fainted) {
  let s = scale||1;
  let bob = (bobOffset||0) + Math.sin(time*1.0+3)*2.5;
  cy += bob;
  let expr = getExpression('beluga');
  let w=130, h=75;

  ctx.save(); ctx.translate(cx,cy); ctx.scale(s,s);
  if (fainted) ctx.rotate(0.3);
  ctx.save(); ctx.scale(-1,1); // face left

  // Tail flukes
  ctx.beginPath();
  ctx.moveTo(-w*0.42, 0);
  ctx.quadraticCurveTo(-w*0.52, -h*0.05, -w*0.55, -h*0.02);
  ctx.bezierCurveTo(-w*0.6, -h*0.12, -w*0.68, -h*0.28, -w*0.72, -h*0.24);
  ctx.quadraticCurveTo(-w*0.65, -h*0.12, -w*0.55, -h*0.02);
  ctx.quadraticCurveTo(-w*0.55, h*0.02, -w*0.65, h*0.12);
  ctx.bezierCurveTo(-w*0.68, h*0.28, -w*0.6, h*0.12, -w*0.55, h*0.02);
  ctx.quadraticCurveTo(-w*0.52, h*0.05, -w*0.42, 0);
  ctx.fillStyle = C.beluga; ctx.fill();
  ctx.strokeStyle = C.outline; ctx.lineWidth = 2; ctx.stroke();

  // Main body - beluga shape (rounder, with prominent melon head)
  ctx.beginPath();
  ctx.moveTo(w*0.45, h*0.05);
  ctx.bezierCurveTo(w*0.32, h*0.18, w*0.12, h*0.3, -w*0.05, h*0.28);
  ctx.bezierCurveTo(-w*0.2, h*0.24, -w*0.35, h*0.14, -w*0.44, h*0.04);
  ctx.bezierCurveTo(-w*0.47, 0, -w*0.47, 0, -w*0.44, -h*0.04);
  ctx.bezierCurveTo(-w*0.35, -h*0.18, -w*0.15, -h*0.3, w*0.0, -h*0.32);
  // Beluga melon (prominent round forehead bulge)
  ctx.bezierCurveTo(w*0.15, -h*0.35, w*0.3, -h*0.42, w*0.4, -h*0.38);
  ctx.bezierCurveTo(w*0.48, -h*0.32, w*0.5, -h*0.18, w*0.48, -h*0.05);
  ctx.bezierCurveTo(w*0.48, h*0.0, w*0.47, h*0.03, w*0.45, h*0.05);
  ctx.closePath();
  ctx.fillStyle = C.beluga; ctx.fill();
  ctx.strokeStyle = C.outline; ctx.lineWidth = 3; ctx.stroke();

  // Lighter belly
  ctx.beginPath();
  ctx.moveTo(w*0.43, h*0.05);
  ctx.bezierCurveTo(w*0.3, h*0.15, w*0.1, h*0.24, -w*0.05, h*0.22);
  ctx.bezierCurveTo(-w*0.15, h*0.18, -w*0.3, h*0.1, -w*0.38, h*0.02);
  ctx.bezierCurveTo(-w*0.2, h*0.02, w*0.1, h*0.05, w*0.43, h*0.05);
  ctx.closePath();
  ctx.fillStyle = '#eae6da'; ctx.fill();

  // Pectoral fin
  ctx.beginPath();
  ctx.moveTo(w*0.1, h*0.12);
  ctx.bezierCurveTo(w*0.06, h*0.25, -w*0.04, h*0.38, -w*0.1, h*0.34);
  ctx.bezierCurveTo(-w*0.04, h*0.25, w*0.02, h*0.18, w*0.1, h*0.12);
  ctx.fillStyle = C.beluga; ctx.fill();
  ctx.strokeStyle = C.outline; ctx.lineWidth = 2; ctx.stroke();

  // Face
  let headX = w*0.4, headY = -h*0.22;
  let mo = mouthOpen('beluga');
  let eyeX = headX+w*0.02, eyeY = headY+h*0.02;
  let eyeH = expr.eyes==='half'?3:expr.eyes==='wide'?7:5;
  ctx.beginPath(); ctx.ellipse(eyeX,eyeY,5,eyeH,0,0,Math.PI*2);
  ctx.fillStyle = '#fff'; ctx.fill(); ctx.strokeStyle = C.outline; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(eyeX+1,eyeY,2.5,3,0,0,Math.PI*2);
  ctx.fillStyle = '#333'; ctx.fill();

  let browY = eyeY-eyeH-3;
  ctx.strokeStyle = C.outline; ctx.lineWidth = 2; ctx.lineCap = 'round';
  ctx.beginPath();
  if (expr.brows==='worried') { ctx.moveTo(eyeX-6,browY+2); ctx.lineTo(eyeX+6,browY-3); }
  else if (expr.brows==='raised') { ctx.moveTo(eyeX-6,browY-3); ctx.quadraticCurveTo(eyeX,browY-7,eyeX+6,browY-3); }
  else { ctx.moveTo(eyeX-6,browY); ctx.lineTo(eyeX+6,browY); }
  ctx.stroke(); ctx.lineCap = 'butt';

  let mouthX = headX, mouthY = headY+h*0.14;
  if (mo > 0.3) {
    ctx.beginPath(); ctx.ellipse(mouthX,mouthY,5,3+mo*4,0,0,Math.PI*2);
    ctx.fillStyle = '#2a1a1a'; ctx.fill(); ctx.strokeStyle = C.outline; ctx.lineWidth = 2; ctx.stroke();
  } else {
    ctx.beginPath();
    if (expr.mouthBase==='smile') { ctx.moveTo(mouthX+8,mouthY-1); ctx.quadraticCurveTo(mouthX,mouthY+5,mouthX-6,mouthY); }
    else if (expr.mouthBase==='frown') { ctx.moveTo(mouthX+8,mouthY+2); ctx.quadraticCurveTo(mouthX,mouthY-3,mouthX-6,mouthY+1); }
    else { ctx.moveTo(mouthX+8,mouthY); ctx.lineTo(mouthX-6,mouthY); }
    ctx.strokeStyle = C.outline; ctx.lineWidth = 2; ctx.stroke();
  }

  // Nervous sweat
  if (!fainted && Math.sin(time*3)>0) {
    ctx.beginPath(); ctx.ellipse(eyeX+10,eyeY+5,2,3,0,0,Math.PI*2);
    ctx.fillStyle = '#8ac'; ctx.fill();
  }

  ctx.restore(); // undo flip
  drawSuit(0,0,130,75,'#3a3a4a',C.tieGold,'left');
  ctx.restore();

  charPositions.beluga = { x: cx - w*0.4*s, y: cy - h*0.5*s };
}

function drawFish(cx, cy, scale) {
  let s = scale||1;
  let bob = Math.sin(time*1.5+5)*4;
  cy += bob;
  ctx.save(); ctx.translate(cx,cy); ctx.scale(s,s);
  ctx.beginPath(); ctx.ellipse(0,0,18,10,0,0,Math.PI*2);
  ctx.fillStyle = C.fish; ctx.fill(); ctx.strokeStyle = C.outline; ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-15,0); ctx.lineTo(-25,-8); ctx.lineTo(-25,8); ctx.closePath();
  ctx.fillStyle = C.fish; ctx.fill(); ctx.strokeStyle = C.outline; ctx.lineWidth = 2; ctx.stroke();

  // Eye
  ctx.beginPath(); ctx.arc(8,-2,3,0,Math.PI*2); ctx.fillStyle = '#fff'; ctx.fill();
  ctx.beginPath(); ctx.arc(9,-2,1.5,0,Math.PI*2); ctx.fillStyle = '#111'; ctx.fill();

  // Mouth animation
  let mo = mouthOpen('fish');
  if (mo > 0.3) {
    ctx.beginPath(); ctx.ellipse(14,1,2,1+mo*2,0,0,Math.PI*2);
    ctx.fillStyle = '#1a0a0a'; ctx.fill();
  }

  // Tiny tie
  ctx.beginPath(); ctx.moveTo(2,2); ctx.lineTo(0,8); ctx.lineTo(-2,2); ctx.closePath();
  ctx.fillStyle = C.tieRed; ctx.fill();
  ctx.restore();

  charPositions.fish = { x: cx, y: cy - 15*s };
}

function drawGalleryFish() {
  let fishPos = [
    {x:120,y:H*0.68,s:0.6,p:0},{x:200,y:H*0.70,s:0.5,p:1},{x:300,y:H*0.67,s:0.7,p:2},
    {x:420,y:H*0.69,s:0.5,p:3},{x:540,y:H*0.68,s:0.6,p:4},{x:680,y:H*0.70,s:0.5,p:5},
    {x:800,y:H*0.67,s:0.6,p:6},{x:920,y:H*0.69,s:0.5,p:0.5},{x:1040,y:H*0.68,s:0.7,p:1.5},
    {x:1140,y:H*0.70,s:0.5,p:2.5},
  ];
  let colors = ['#6a8aaa','#7a9aba','#5a7a9a','#8aaaca'];
  fishPos.forEach(f => {
    let yOff = Math.sin(time*1.2+f.p)*3;
    ctx.save(); ctx.translate(f.x,f.y+yOff); ctx.scale(f.s,f.s);
    ctx.beginPath(); ctx.ellipse(0,0,14,8,0,0,Math.PI*2);
    ctx.fillStyle = colors[Math.floor(f.p)%colors.length]; ctx.fill();
    ctx.strokeStyle = C.outline; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-12,0); ctx.lineTo(-20,-6); ctx.lineTo(-20,6); ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(5,-1,2,0,Math.PI*2); ctx.fillStyle = '#fff'; ctx.fill();
    ctx.beginPath(); ctx.arc(5.5,-1,1,0,Math.PI*2); ctx.fillStyle = '#111'; ctx.fill();
    ctx.restore();
  });
}

// ===== SPEECH BUBBLE (comic book style) =====

function drawSpeechBubble(speaker, text, alpha) {
  let pos = charPositions[speaker];
  if (!pos) return;

  ctx.save();
  ctx.globalAlpha = Math.min(1, alpha);

  // Measure text
  ctx.font = 'bold 15px "Helvetica Neue", Arial, sans-serif';
  let maxTextW = 340;

  // Word wrap
  let words = text.split(' ');
  let lines = [], currentLine = '';
  words.forEach(word => {
    let test = currentLine ? currentLine+' '+word : word;
    if (ctx.measureText(test).width > maxTextW) {
      if (currentLine) lines.push(currentLine);
      currentLine = word;
    } else currentLine = test;
  });
  if (currentLine) lines.push(currentLine);

  let lineH = 22;
  let padX = 20, padY = 14;
  let textW = 0;
  lines.forEach(l => { let w = ctx.measureText(l).width; if (w > textW) textW = w; });
  let bubbleW = textW + padX*2;
  let bubbleH = lines.length * lineH + padY*2;
  let r = 16; // corner radius

  // Find the active caption to get bubbleDir
  let bubbleDir = 'above';
  for (let cap of captions) {
    if (cap.speaker === speaker && time >= cap.start && time <= cap.end) {
      bubbleDir = cap.bubbleDir || 'above';
      break;
    }
  }

  // Position bubble above character, offset based on direction
  let tailX = pos.x;
  let tailY = pos.y;
  let bx, by;

  if (bubbleDir === 'above-right') {
    bx = tailX + 20;
    by = tailY - bubbleH - 30;
  } else if (bubbleDir === 'above-left') {
    bx = tailX - bubbleW - 20;
    by = tailY - bubbleH - 30;
  } else {
    bx = tailX - bubbleW/2;
    by = tailY - bubbleH - 30;
  }

  // Clamp to screen edges
  bx = Math.max(12, Math.min(W - bubbleW - 12, bx));
  by = Math.max(12, Math.min(H - bubbleH - 40, by));

  // Draw rounded rectangle
  ctx.beginPath();
  ctx.moveTo(bx+r, by);
  ctx.lineTo(bx+bubbleW-r, by);
  ctx.quadraticCurveTo(bx+bubbleW, by, bx+bubbleW, by+r);
  ctx.lineTo(bx+bubbleW, by+bubbleH-r);
  ctx.quadraticCurveTo(bx+bubbleW, by+bubbleH, bx+bubbleW-r, by+bubbleH);
  ctx.lineTo(bx+r, by+bubbleH);
  ctx.quadraticCurveTo(bx, by+bubbleH, bx, by+bubbleH-r);
  ctx.lineTo(bx, by+r);
  ctx.quadraticCurveTo(bx, by, bx+r, by);
  ctx.closePath();
  ctx.fillStyle = C.bubbleBg;
  ctx.fill();
  ctx.strokeStyle = C.bubbleBorder;
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // Tail triangle pointing to speaker
  let tailBaseX, tailBaseX2;
  // Figure out where tail connects to bubble bottom
  let clampedTailX = Math.max(bx+25, Math.min(bx+bubbleW-25, tailX));
  tailBaseX = clampedTailX - 10;
  tailBaseX2 = clampedTailX + 10;

  ctx.beginPath();
  ctx.moveTo(tailBaseX, by+bubbleH-1);
  ctx.lineTo(tailX, tailY);
  ctx.lineTo(tailBaseX2, by+bubbleH-1);
  ctx.closePath();
  ctx.fillStyle = C.bubbleBg;
  ctx.fill();
  // Draw tail border lines (not the base, just the two sides)
  ctx.beginPath();
  ctx.moveTo(tailBaseX, by+bubbleH);
  ctx.lineTo(tailX, tailY);
  ctx.lineTo(tailBaseX2, by+bubbleH);
  ctx.strokeStyle = C.bubbleBorder;
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // Cover the tail base with bubble fill to hide the border overlap
  ctx.beginPath();
  ctx.moveTo(tailBaseX-2, by+bubbleH-3);
  ctx.lineTo(tailBaseX2+2, by+bubbleH-3);
  ctx.lineTo(tailBaseX2+2, by+bubbleH+1);
  ctx.lineTo(tailBaseX-2, by+bubbleH+1);
  ctx.closePath();
  ctx.fillStyle = C.bubbleBg;
  ctx.fill();

  // Text
  ctx.font = 'bold 15px "Helvetica Neue", Arial, sans-serif';
  ctx.fillStyle = C.bubbleText;
  ctx.textBaseline = 'top';
  lines.forEach((line, i) => {
    ctx.fillText(line, bx+padX, by+padY+i*lineH);
  });
  ctx.textBaseline = 'alphabetic';

  ctx.restore();
}

// ===== ENVIRONMENT =====

function drawBubbles() {
  bubbles.forEach(b => {
    b.y -= b.speed; b.wobble += b.wobbleSpeed;
    if (b.y < -20) { b.y = H+20; b.x = Math.random()*W; }
    ctx.beginPath(); ctx.arc(b.x+Math.sin(b.wobble)*8,b.y,b.r,0,Math.PI*2);
    ctx.fillStyle = 'rgba(180,210,240,0.15)'; ctx.fill();
    ctx.strokeStyle = 'rgba(180,210,240,0.2)'; ctx.lineWidth = 0.5; ctx.stroke();
  });
}

function drawParticles() {
  particles.forEach(p => {
    p.x += p.dx; p.y += p.dy;
    if (p.x<0) p.x=W; if (p.x>W) p.x=0; if (p.y<0) p.y=H; if (p.y>H) p.y=0;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle = `rgba(160,200,220,${p.alpha})`; ctx.fill();
  });
}

let gavelStrike = false, gavelStrikeTime = 0;

function drawGavel(cx,cy) {
  ctx.save(); ctx.translate(cx,cy);
  let angle = 0;
  if (gavelStrike) {
    let t = time-gavelStrikeTime;
    if (t<0.3) angle = -0.5*(1-t/0.3);
  }
  ctx.rotate(angle);
  ctx.fillStyle = '#6a4a2a'; ctx.strokeStyle = C.outline; ctx.lineWidth = 2;
  ctx.fillRect(-3,-30,6,30); ctx.strokeRect(-3,-30,6,30);
  ctx.fillStyle = '#5a3a1a'; ctx.fillRect(-12,-38,24,12); ctx.strokeRect(-12,-38,24,12);
  ctx.fillStyle = C.gold; ctx.fillRect(-12,-37,24,2); ctx.fillRect(-12,-29,24,2);
  ctx.restore();
}

function drawTitle(alpha) {
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.font = 'bold 28px "Helvetica Neue", Arial, sans-serif';
  ctx.fillStyle = '#e8e8e8'; ctx.textAlign = 'center';
  ctx.fillText('WHALE v. BELUGA ENTERTAINMENT LLC', W/2, H/2-10);
  ctx.textAlign = 'left'; ctx.restore();
}

function drawFade(alpha) {
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
  ctx.restore();
}

// ===== MAIN RENDER =====

function render() {
  ctx.clearRect(0,0,W,H);

  // Helper: draws judge behind bench in correct z-order (gavel, then judge, then bench on top)
  // sinkOffset: how far down the judge has sunk (0 = normal, positive = lower)
  function drawJudgeBehindBench(showGavel, sinkOffset) {
    if (showGavel) drawGavel(W*0.57, H*0.32);
    drawJudge(W*0.5, H*0.3 + (sinkOffset||0), 0.82);
    drawBench(W*0.5, H*0.38, 320, 120); // bench drawn ON TOP of judge
  }

  if (time < 8) {
    // INTRO
    let panProgress = easeInOut(Math.min(1, time/3));
    let panY = lerp(-200,0,panProgress);
    drawOcean(panY); drawBubbles(); drawParticles();

    let courtAlpha = Math.max(0,(time-1.5)/1.5);
    ctx.save(); ctx.globalAlpha = Math.min(1,courtAlpha);
    drawCourtroomBack(); drawGalleryFish();
    if (time > 2) {
      let ca = Math.min(1,(time-2)/1);
      ctx.globalAlpha = ca;
      let showGavel = time > 2.5;
      if (time > 2.8 && !gavelStrike) { gavelStrike=true; gavelStrikeTime=2.8; }
      drawJudgeBehindBench(showGavel);
      drawAdam(W*0.25, H*0.48, 0.88);
      drawOrca(W*0.72, H*0.47, 0.72);
      drawBeluga(W*0.82, H*0.50, 0.57);
    }
    ctx.restore();

    if (time > 0.5 && time < 3) {
      let ta = time<1?(time-0.5)/0.5:time>2.5?1-(time-2.5)/0.5:1;
      drawTitle(ta);
    }

  } else if (time < 20) {
    // ADAM'S ARGUMENT
    drawOcean(0); drawBubbles(); drawParticles();
    drawCourtroomBack(); drawGalleryFish();
    drawJudgeBehindBench(false);
    drawOrca(W*0.72, H*0.47, 0.72);
    drawBeluga(W*0.82, H*0.50, 0.57);
    let adamX = lerp(W*0.25, W*0.32, easeInOut(Math.min(1,(time-8)/2)));
    let gesturing = time > 9 && time < 19;
    drawAdam(adamX, H*0.48, 0.88, 0, gesturing);

  } else if (time < 30) {
    // DEFENSE REBUTTAL
    drawOcean(0); drawBubbles(); drawParticles();
    drawCourtroomBack(); drawGalleryFish();
    drawJudgeBehindBench(false);
    drawAdam(W*0.28, H*0.48, 0.88);
    drawBeluga(W*0.82, H*0.50, 0.57);
    let orcaX = lerp(W*0.72, W*0.65, easeInOut(Math.min(1,(time-20)/1.5)));
    drawOrca(orcaX, H*0.47, 0.72);
    if (time > 29.5) { gavelStrike=true; gavelStrikeTime=29.5; }

  } else if (time < 40) {
    // VERDICT
    drawOcean(0); drawBubbles(); drawParticles();
    drawCourtroomBack(); drawGalleryFish();
    if (time < 31) { gavelStrike=true; gavelStrikeTime=30; }
    // Judge ducks down behind bench when leaving (37-40s)
    let judgeSink = lerp(0, 120, easeInOut(Math.max(0, (time - 37) / 2.5)));
    drawJudgeBehindBench(time < 31, judgeSink);

    // After verdict, others start leaving (37-40s)
    let exitT = Math.max(0, (time - 37) / 3); // 0 to 1 over 3 seconds
    let orcaX = lerp(W*0.72, W + 150, easeInOut(exitT));
    let belugaX = lerp(W*0.82, W + 200, easeInOut(Math.max(0, exitT - 0.1)));
    drawOrca(orcaX, H*0.47, 0.72);
    let belugaFainted = time > 36;
    drawBeluga(belugaX, H*0.50, 0.57, belugaFainted?15:0, belugaFainted);

    let adamGesture = time > 35 && time < 38;
    drawAdam(W*0.28, H*0.48, 0.88, 0, adamGesture);

  } else if (time < 52) {
    // TAG - BIRTHDAY
    drawOcean(0); drawBubbles(); drawParticles();
    drawCourtroomBack(); drawBench(W*0.5, H*0.38, 320, 120);

    let adamX, adamFacingLeft = false;
    // Fish rises up from under the plaintiff table
    let fishX = W*0.35;
    let fishY = lerp(H*0.62, H*0.38, easeOut(Math.min(1,(time-40.5)/2)));

    if (time > 49) {
      // Adam swims away to the LEFT (facing left)
      adamX = lerp(W*0.3, -150, easeInOut((time-49)/2.5));
      adamFacingLeft = true;
    } else {
      adamX = lerp(W*0.4, W*0.3, easeInOut(Math.min(1,(time-40)/3)));
    }
    drawAdam(adamX, H*0.50, 0.88, 0, false, adamFacingLeft);
    if (time > 40.5) drawFish(fishX, fishY, 0.65);

    if (time > 50) drawFade(Math.min(1,(time-50)/2));

  } else {
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
    // Show replay button
    let replayBtn = document.getElementById('replayBtn');
    if (replayBtn.style.display !== 'block') {
      replayBtn.style.display = 'block';
    }
  }

  // Draw speech bubbles LAST (on top of everything)
  captions.forEach(cap => {
    if (time >= cap.start && time <= cap.end) {
      let fadeIn = Math.min(1,(time-cap.start)/0.25);
      let fadeOut = Math.min(1,(cap.end-time)/0.25);
      drawSpeechBubble(cap.speaker, cap.text, Math.min(fadeIn,fadeOut));
    }
  });
}

// Animation loop
let lastTimestamp = null;
function animate(timestamp) {
  if (!lastTimestamp) lastTimestamp = timestamp;
  time += (timestamp-lastTimestamp)/1000;
  lastTimestamp = timestamp;
  render();
  if (time < 54) animFrame = requestAnimationFrame(animate);
}

document.getElementById('startBtn').addEventListener('click', function() {
  this.style.display = 'none';
  document.getElementById('replayBtn').style.display = 'none';
  time = 0; lastTimestamp = null; gavelStrike = false;
  animate(performance.now());
});

document.getElementById('replayBtn').addEventListener('click', function() {
  this.style.display = 'none';
  time = 0; lastTimestamp = null; gavelStrike = false;
  if (animFrame) cancelAnimationFrame(animFrame);
  animate(performance.now());
});

time = 0; render();
</script>
</body>
